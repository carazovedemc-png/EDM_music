<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDM™ FIT | Premium AI</title>
    <!-- Библиотеки -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            margin: 0;
            color: white;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .liquid-bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 15% 15%, rgba(59, 130, 246, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, rgba(147, 51, 234, 0.15) 0%, transparent 45%);
            z-index: -1;
            filter: blur(40px);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .shutter-btn {
            background: white;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4), inset 0 0 0 4px #020617;
        }

        .animate-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Вставь свой API ключ сюда
        const apiKey = ""; 

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>,
                User: <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>,
                Camera: <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>,
                History: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>,
                X: <path d="M18 6 6 18M6 6l12 12"/>,
                Water: <path d="M7 16.3c2.2 0 4-1.8 4-4 0-3.3-4-6-4-6s-4 2.7-4 6c0 2.2 1.8 4 4 4Z"/><path d="M17 14c1.1 0 2-.9 2-2 0-1.6-2-3-2-3s-2 1.4-2 3c0 1.1.9 2 2 2Z"/>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons['X']}
                </svg>
            );
        };

        const App = () => {
            const [view, setView] = useState('onboarding');
            const [profile, setProfile] = useState({ name: '', weight: '', goal: 2400 });

            useEffect(() => {
                const saved = localStorage.getItem('edm_fit_vfinal');
                if (saved) { setProfile(JSON.parse(saved)); setView('home'); }
            }, []);

            const saveProfile = (e) => {
                e.preventDefault();
                localStorage.setItem('edm_fit_vfinal', JSON.stringify(profile));
                setView('home');
            };

            if (view === 'onboarding') return (
                <div className="h-screen flex flex-col items-center justify-center p-10 animate-up">
                    <div className="liquid-bg"></div>
                    <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center shadow-2xl mb-8 border border-white/20">
                        <Icon name="Flame" size={40} className="text-white" />
                    </div>
                    <h1 className="text-4xl font-black italic tracking-tighter mb-2 uppercase">EDM™ FIT</h1>
                    <p className="text-slate-500 mb-10 font-bold uppercase tracking-widest text-[10px]">Premium AI • Симферополь</p>
                    <form onSubmit={saveProfile} className="w-full max-w-xs space-y-4">
                        <input className="w-full glass rounded-2xl p-5 outline-none font-bold" placeholder="Имя" onChange={e => setProfile({...profile, name: e.target.value})} required />
                        <input className="w-full glass rounded-2xl p-5 outline-none font-bold" type="number" placeholder="Вес (кг)" onChange={e => setProfile({...profile, weight: e.target.value})} required />
                        <button className="w-full bg-white text-black py-5 rounded-2xl font-black text-lg active:scale-95 transition-all">НАЧАТЬ</button>
                    </form>
                </div>
            );

            return (
                <div className="h-screen flex flex-col animate-up">
                    <div className="liquid-bg"></div>
                    <header className="p-6 flex justify-between items-center glass sticky top-0 z-50">
                        <span className="font-black italic text-xl tracking-tighter text-blue-500">EDM™ FIT</span>
                        <div className="w-10 h-10 glass rounded-xl flex items-center justify-center border border-white/10 shadow-lg">
                            <Icon name="User" size={18} />
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-6 pb-32">
                        <div className="glass rounded-[35px] p-8 mb-6 shadow-2xl border border-white/5 relative overflow-hidden">
                            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Калории сегодня</p>
                            <h2 className="text-5xl font-black tracking-tighter">0 <span className="text-lg font-normal text-slate-600 italic">/ {profile.goal}</span></h2>
                            <div className="w-full h-1.5 bg-white/5 rounded-full mt-6 overflow-hidden">
                                <div className="h-full bg-blue-500" style={{width: '0%'}}></div>
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-4">
                            <div className="glass rounded-[30px] p-6 h-40 flex flex-col justify-between shadow-xl">
                                <Icon name="Water" className="text-cyan-400" />
                                <div>
                                    <p className="text-2xl font-black">0 мл</p>
                                    <p className="text-[10px] font-bold text-slate-500 uppercase">Вода</p>
                                </div>
                            </div>
                            <div className="glass rounded-[30px] p-6 h-40 flex flex-col justify-between shadow-xl">
                                <Icon name="Flame" className="text-orange-400" />
                                <div>
                                    <p className="text-2xl font-black">0%</p>
                                    <p className="text-[10px] font-bold text-slate-500 uppercase">Цель</p>
                                </div>
                            </div>
                        </div>
                    </main>

                    <nav className="fixed bottom-8 left-8 right-8 glass rounded-[35px] p-3 flex justify-around items-center px-10 shadow-2xl border border-white/5">
                        <Icon name="History" size={24} className="text-slate-600" />
                        <div className="w-16 h-16 bg-white text-black rounded-2xl flex items-center justify-center -mt-12 shadow-2xl border-[6px] border-[#020617] active:scale-90 transition-all cursor-pointer">
                            <Icon name="Camera" size={28} />
                        </div>
                        <Icon name="User" size={24} className="text-slate-600" />
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
