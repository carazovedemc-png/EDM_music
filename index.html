<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDM™ FIT | Premium</title>
    <!-- Подключаем библиотеки -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Резервный индикатор загрузки, если JS тормозит */
        #loader {
            position: fixed; inset: 0; background: #020617; 
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animate: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="root"></div>
    
    <!-- Важно: type="text/babel" и data-type="module" для корректной работы React в браузере -->
    <script type="text/babel" src="script.js" data-presets="react"></script>
    
    <script>
        // Убираем лоадер, как только React начнет рендерить
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if(loader) loader.style.display = 'none';
            }, 1000);
        });
    </script>
</body>
</html>
